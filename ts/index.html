<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Ders Platformu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #f1f1f1;
            min-height: 100vh;
        }

        /* ===== LAYOUT ===== */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            gap: 24px;
            width: 100%;
        }

        .player-section {
            flex: 1;
            min-width: 0;
        }

        .sidebar {
            width: 400px;
            flex-shrink: 0;
        }

        /* ===== PLYR DARK THEME CUSTOMIZATION ===== */
        .plyr-container {
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        :root {
            --plyr-color-main: #ff0000;
            --plyr-video-background: #000;
            --plyr-menu-background: #1a1a1a;
            --plyr-menu-color: #f1f1f1;
            --plyr-menu-border-color: rgba(255, 255, 255, 0.08);
            --plyr-menu-border-shadow-color: rgba(0, 0, 0, 0.6);
            --plyr-badge-background: #ff0000;
            --plyr-badge-text-color: #fff;
            --plyr-badge-border-radius: 4px;
            --plyr-control-icon-size: 20px;
            --plyr-tooltip-background: rgba(0, 0, 0, 0.85);
            --plyr-tooltip-color: #fff;
            --plyr-tooltip-radius: 6px;
            --plyr-font-family: 'Inter', sans-serif;
            --plyr-font-size-base: 14px;
            --plyr-font-size-small: 12px;
            --plyr-font-size-time: 13px;
            --plyr-range-thumb-height: 14px;
            --plyr-range-thumb-background: #fff;
            --plyr-range-track-height: 4px;
            --plyr-range-fill-background: #ff0000;
            --plyr-video-control-background-hover: rgba(255, 255, 255, 0.15);
            --plyr-video-controls-background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
        }

        /* Fine-tune Plyr menu styling for dark theme */
        .plyr__menu__container {
            background: #212121 !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
        }

        .plyr__menu__container [role=menu] {
            padding: 4px 0;
        }

        .plyr__menu__container .plyr__control {
            color: #eee !important;
            font-size: 13px;
        }

        .plyr__menu__container .plyr__control:hover,
        .plyr__menu__container .plyr__control:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
        }

        .plyr__menu__container .plyr__control[aria-checked="true"]::before {
            background: #3ea6ff !important;
        }

        .plyr__menu__container .plyr__control--back {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            font-weight: 600;
        }

        .plyr__menu__container label.plyr__control {
            padding: 6px 16px;
        }

        /* Video container rounded corners */
        .plyr--video {
            border-radius: 12px;
            overflow: hidden;
        }

        /* Make plyr controls text consistent */
        .plyr__controls__item.plyr__time {
            font-variant-numeric: tabular-nums;
        }

        /* ===== VIDEO INFO ===== */
        .video-info {
            padding: 16px 0;
        }

        .video-title {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.4;
            color: #f1f1f1;
        }

        .video-meta {
            font-size: 13px;
            color: #aaa;
            margin-top: 6px;
        }

        /* ===== SIDEBAR ===== */
        .sidebar-section {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .sidebar-header {
            padding: 14px 16px;
            font-size: 15px;
            font-weight: 600;
            color: #f1f1f1;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-header svg {
            width: 18px;
            height: 18px;
            fill: #3ea6ff;
        }

        .instructor-select {
            width: 100%;
            padding: 10px 16px;
            background: #272727;
            color: #f1f1f1;
            border: none;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            outline: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .instructor-select:focus {
            background: #333;
        }

        .instructor-select option {
            background: #272727;
            color: #f1f1f1;
        }

        /* Lesson list */
        .lesson-list {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #555 transparent;
        }

        .lesson-list::-webkit-scrollbar {
            width: 6px;
        }

        .lesson-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .lesson-list::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 3px;
        }

        .lesson-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
        }

        .lesson-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .lesson-item.active {
            background: rgba(62, 166, 255, 0.08);
            border-left-color: #3ea6ff;
        }

        .lesson-number {
            font-size: 13px;
            color: #717171;
            min-width: 22px;
            padding-top: 2px;
            text-align: center;
        }

        .lesson-details {
            flex: 1;
            min-width: 0;
        }

        .lesson-title {
            font-size: 13px;
            font-weight: 500;
            color: #f1f1f1;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .lesson-meta {
            font-size: 12px;
            color: #717171;
            margin-top: 3px;
        }

        .lesson-playing-icon {
            display: none;
            width: 14px;
            height: 14px;
            margin-top: 2px;
        }

        .lesson-item.active .lesson-playing-icon {
            display: block;
        }

        .lesson-item.active .lesson-number {
            display: none;
        }

        /* Empty state */
        .empty-state {
            padding: 40px 16px;
            text-align: center;
            color: #717171;
            font-size: 13px;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            fill: #333;
            margin-bottom: 12px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .main-content {
                flex-direction: column;
                padding: 12px;
            }

            .sidebar {
                width: 100%;
            }

            .lesson-list {
                max-height: 400px;
            }
        }

        @media (max-width: 640px) {
            .main-content {
                padding: 0;
            }

            .plyr-container {
                border-radius: 0;
            }

            .plyr--video {
                border-radius: 0;
            }

            .video-info {
                padding: 12px;
            }

            .sidebar {
                padding: 0 8px;
            }
        }

        /* ===== DOWNLOAD BUTTON ===== */
        .lesson-download {
            background: none;
            border: none;
            padding: 6px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.15s;
            flex-shrink: 0;
            opacity: 0;
        }

        .lesson-item:hover .lesson-download {
            opacity: 1;
        }

        .lesson-download:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }

        .lesson-download svg {
            width: 18px;
            height: 18px;
            fill: #aaa;
            transition: fill 0.15s;
        }

        .lesson-download:hover svg {
            fill: #3ea6ff;
        }

        /* Download toast notification */
        .download-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #323232;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            opacity: 0;
            pointer-events: none;
        }

        .download-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .download-toast svg {
            width: 20px;
            height: 20px;
            fill: #4caf50;
            flex-shrink: 0;
        }

        .download-toast a {
            color: #3ea6ff;
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
        }

        .download-toast a:hover {
            text-decoration: underline;
        }

        /* Download Modal overlay */
        .download-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .download-modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .download-modal {
            background: #1f1f1f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .download-modal-overlay.show .download-modal {
            transform: scale(1);
        }

        .download-modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
        }

        .download-modal-status {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 20px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }

        .download-progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .download-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3ea6ff, #0056b3);
            border-radius: 4px;
            transition: width 0.2s ease;
        }

        .download-modal-btn {
            background: #272727;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .download-modal-btn:hover {
            background: #3f3f3f;
            border-color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div class="main-content">
            <!-- Player Section -->
            <div class="player-section">
                <div class="plyr-container">
                    <video id="videoPlayer" playsinline></video>
                </div>

                <!-- Video info -->
                <div class="video-info">
                    <div class="video-title" id="videoTitle">Bir ders seçin</div>
                    <div class="video-meta" id="videoMeta"></div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-header">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                        </svg>
                        Eğitmen
                    </div>
                    <select id="instructorSelect" class="instructor-select" onchange="loadLessons()">
                        <option value="">Eğitmen seçin...</option>
                    </select>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-header">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z" />
                        </svg>
                        Dersler
                    </div>
                    <div class="lesson-list" id="lessonList">
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z" />
                            </svg>
                            <p>Ders listesini görmek için bir eğitmen seçin</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Download Progress Modal -->
    <div class="download-modal-overlay" id="downloadModal">
        <div class="download-modal">
            <div class="download-modal-title" id="downloadModalTitle">Video İndiriliyor</div>
            <div class="download-progress-container">
                <div class="download-progress-bar" id="downloadProgressBar"></div>
            </div>
            <div class="download-modal-status" id="downloadModalStatus">Hazırlanıyor...</div>
            <button class="download-modal-btn" id="cancelDownloadBtn">İptal Et</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.min.js"></script>
    <script>
        // ===== DATA =====
        const instructors = [
            'Ahmet_Atilla_Yilmazer.json', 'Ali_Sacan.json', 'All_Star_Ogretmeni.json',
            'Altug_Gunes.json', 'Baris_Kapan.json', 'Bayram_Meral.json',
            'Betul_Buyukkalayci.json', 'Burak_Onay.json', 'Busra_Altinok.json',
            'Celal_Gunduz.json', 'Deniz_Bozkurt.json', 'Deniz_Ongel.json',
            'Didar_Baskin.json', 'Enes_Avci.json', 'Enise_Ozdemir.json',
            'Erdal_Aydemir.json', 'Erkan_Ayranci.json', 'Erkan_Tuncer.json',
            'Eyup_Boncuk.json', 'Fatih_Demirkaya.json', 'Fatih_Vural.json',
            'Ferda_Kurnaz_Karagoz.json', 'Gorkem_Sahin.json', 'Gri_Koc.json',
            'Gulhan_Sen.json', 'Hale_Karatas.json', 'Hilmi_Yavuz.json',
            'Ibrahim_Turker.json', 'Ibrahim_Ulas_Baldemir.json', 'Ilhan_Aslan.json',
            'Ilyas_Gunes.json', 'Ismail_Kocabas.json', 'Ismail_Tolga_Aktas.json',
            'Kader_Altinel.json', 'Kadir_Gumus.json', 'Kanan_Kara.json',
            'Kemal_Coskun.json', 'Kenan_Kara.json', 'Mahsum_Ozturk.json',
            'Mehmet_Celal_Ozyildiz.json', 'Mehmet_Dural.json', 'Mehmet_Durmus.json',
            'Mesut_Ugurdogan.json', 'Murat_Namli.json', 'Mustafa_Ozturk.json',
            'Mustafa_Yagci.json', 'Nagihan_Hoca.json', 'Nurtac_Kozak.json',
            'Nurten_Aydin.json', 'Oktay_Duran.json', 'Onay_CEPE.json',
            'Onur_Soguk.json', 'Ozcan_Aykin.json', 'Ozer_Akgumus.json',
            'Ozlem_Penekli.json', 'Oznur_Saat_Yildirim.json', 'Rabia_Nalan_Cinar.json',
            'Recep_Ustunel.json', 'Rustu_Bayindir.json', 'Salih_Yildirir.json',
            'Selim_Yuksel.json', 'Selma_Kalemci.json', 'Semih_Akpinar.json',
            'Senol_Aydin.json', 'Sercan_Dural.json', 'Sinan_Aydin.json',
            'Sukru_Akkoyun.json', 'Uzay_Aslanturk.json', 'Veysel_Boynuegri.json',
            'Yavuz_Tuna.json', 'Yunus_Turan.json'
        ];

        // ===== STATE =====
        let currentHls = null;
        let plyrPlayer = null;
        let baseStreamUrl = '';

        // ===== ELEMENTS =====
        const videoEl = document.getElementById('videoPlayer');
        const videoTitle = document.getElementById('videoTitle');
        const videoMeta = document.getElementById('videoMeta');

        // ===== PLYR OPTIONS BUILDER =====
        function buildPlyrOptions(qualityConfig) {
            const opts = {
                controls: [
                    'play-large',
                    'rewind',
                    'play',
                    'fast-forward',
                    'progress',
                    'current-time',
                    'duration',
                    'mute',
                    'volume',
                    'settings',
                    'download',
                    'fullscreen'
                ],
                settings: ['quality', 'speed'],
                speed: {
                    selected: 1,
                    options: [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2]
                },
                tooltips: {
                    controls: true,
                    seek: true
                },
                keyboard: {
                    focused: true,
                    global: true
                },
                seekTime: 10,
                urls: {
                    download: null
                },
                i18n: {
                    restart: 'Baştan Başlat',
                    rewind: '{seektime} saniye geri',
                    play: 'Oynat',
                    pause: 'Duraklat',
                    fastForward: '{seektime} saniye ileri',
                    seek: 'Ara',
                    seekLabel: '{currentTime} / {duration}',
                    played: 'Oynatıldı',
                    buffered: 'Tamponlandı',
                    currentTime: 'Şu anki zaman',
                    duration: 'Süre',
                    volume: 'Ses',
                    mute: 'Sesi Kapat',
                    unmute: 'Sesi Aç',
                    enableCaptions: 'Altyazıları Aç',
                    disableCaptions: 'Altyazıları Kapat',
                    download: 'İndir',
                    enterFullscreen: 'Tam Ekran',
                    exitFullscreen: 'Tam Ekrandan Çık',
                    frameTitle: 'Player {title}',
                    captions: 'Altyazılar',
                    settings: 'Ayarlar',
                    menuBack: 'Geri',
                    speed: 'Hız',
                    normal: 'Normal',
                    quality: 'Kalite',
                    loop: 'Döngü',
                    start: 'Başlangıç',
                    end: 'Bitiş',
                    all: 'Tümü',
                    reset: 'Sıfırla',
                    disabled: 'Kapalı',
                    enabled: 'Açık',
                    advertisement: 'Reklam',
                    qualityBadge: {
                        2160: '4K',
                        1440: 'HD',
                        1080: 'HD',
                        720: 'HD',
                        576: 'SD',
                        480: 'SD',
                    },
                },
            };

            if (qualityConfig) {
                opts.quality = qualityConfig;
            }

            return opts;
        }

        // ===== ATTACH DOWNLOAD HANDLER =====
        function attachDownloadHandler() {
            if (!plyrPlayer || !plyrPlayer.elements || !plyrPlayer.elements.container) return;
            const dlBtn = plyrPlayer.elements.container.querySelector('[data-plyr="download"]');
            if (dlBtn) {
                dlBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!baseStreamUrl) {
                        alert('Önce bir ders seçin');
                        return;
                    }
                    const title = videoTitle.textContent || 'video';
                    downloadVideo(baseStreamUrl, title);
                });
            }
        }

        // ===== INIT =====
        window.onload = function () {
            const select = document.getElementById('instructorSelect');
            instructors.forEach(file => {
                const option = document.createElement('option');
                option.value = file;
                option.textContent = file.replace('.json', '').replaceAll('_', ' ');
                select.appendChild(option);
            });

            // Create initial Plyr instance (no video loaded yet)
            plyrPlayer = new Plyr(videoEl, buildPlyrOptions());
            attachDownloadHandler();
        };

        // ===== FORMAT TIME =====
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // ===== LESSONS =====
        let allLessons = [];
        let activeLessonIndex = -1;

        async function loadLessons() {
            const instructorFile = document.getElementById('instructorSelect').value;
            if (!instructorFile) return;
            const lessonList = document.getElementById('lessonList');
            lessonList.innerHTML = '<div class="empty-state"><p>Yükleniyor...</p></div>';

            try {
                const response = await fetch(instructorFile);
                allLessons = await response.json();
                renderLessons();
            } catch (error) {
                lessonList.innerHTML = '<div class="empty-state"><p>Ders bilgileri yüklenemedi!</p></div>';
            }
        }

        function renderLessons() {
            const lessonList = document.getElementById('lessonList');
            lessonList.innerHTML = '';

            allLessons.forEach((lesson, index) => {
                const item = document.createElement('div');
                item.className = 'lesson-item' + (index === activeLessonIndex ? ' active' : '');
                item.innerHTML = `
                    <span class="lesson-number">${index + 1}</span>
                    <svg class="lesson-playing-icon" viewBox="0 0 24 24" fill="#3ea6ff"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                    <div class="lesson-details">
                        <div class="lesson-title">${lesson.title}</div>
                        <div class="lesson-meta">${lesson.instructor_name} · ${lesson.duration}</div>
                    </div>
                    <button class="lesson-download" data-url="${lesson.stream_url}" data-title="${lesson.title.replace(/"/g, '&quot;')}" title="İndir">
                        <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zM19 9h-4V3H9v6H5l7 7 7-7z"/></svg>
                    </button>
                `;
                item.addEventListener('click', () => {
                    activeLessonIndex = index;
                    baseStreamUrl = lesson.stream_url;
                    videoTitle.textContent = lesson.title;
                    videoMeta.textContent = `${lesson.instructor_name} · ${lesson.duration}`;
                    playVideo(lesson.stream_url);
                    renderLessons();
                });
                lessonList.appendChild(item);

                // Download button handler
                const dlBtn = item.querySelector('.lesson-download');
                dlBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    downloadVideo(lesson.stream_url, lesson.title);
                });
            });
        }

        // ===== HLS PLAYBACK WITH PLYR =====
        // Feed the MASTER playlist to HLS.js so it can handle all quality levels.
        // Plyr is destroyed and re-created BEFORE HLS attaches to ensure clean state.
        function playVideo(masterUrl) {
            // 1. Destroy previous HLS instance
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }

            // 2. Destroy previous Plyr instance (restores original <video> element)
            if (plyrPlayer) {
                plyrPlayer.destroy();
                plyrPlayer = null;
            }

            // 3. Get fresh reference to the restored video element
            const vid = document.getElementById('videoPlayer');

            if (Hls.isSupported()) {
                const hls = new Hls({
                    maxBufferLength: 30,
                    maxMaxBufferLength: 60,
                });
                currentHls = hls;

                // 4. Load the MASTER playlist (not a specific chunklist!)
                //    HLS.js will parse all quality levels from it
                hls.loadSource(masterUrl);

                hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                    // 5. Extract available quality levels
                    const availableQualities = hls.levels.map(l => l.height);
                    const uniqueQualities = [...new Set(availableQualities)].sort((a, b) => b - a);

                    // 6. Build Plyr quality config that controls HLS.js levels
                    const qualityConfig = {
                        default: uniqueQualities[0],
                        options: uniqueQualities,
                        forced: true,
                        onChange: (newQuality) => {
                            console.log('[Quality] Switching to', newQuality + 'p');
                            hls.levels.forEach((level, levelIndex) => {
                                if (level.height === newQuality) {
                                    hls.currentLevel = levelIndex;
                                }
                            });
                        }
                    };

                    // 7. Create Plyr with quality options
                    plyrPlayer = new Plyr(vid, buildPlyrOptions(qualityConfig));
                    attachDownloadHandler();

                    // 8. Autoplay
                    vid.play().catch(err => {
                        console.log('[Plyr] Autoplay blocked:', err.message);
                    });
                });

                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.error('HLS network error, trying to recover...');
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.error('HLS media error, trying to recover...');
                                hls.recoverMediaError();
                                break;
                            default:
                                console.error('HLS fatal error, cannot recover');
                                hls.destroy();
                                break;
                        }
                    }
                });

                // 5. Attach HLS to the video element AFTER setting up events
                hls.attachMedia(vid);

            } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari native HLS — no HLS.js needed
                vid.src = masterUrl;
                plyrPlayer = new Plyr(vid, buildPlyrOptions());
                attachDownloadHandler();
                vid.addEventListener('loadedmetadata', () => {
                    vid.play().catch(() => { });
                }, { once: true });
            }
        }

        // ===== DOWNLOAD =====
        const downloadModal = document.getElementById('downloadModal');
        const downloadModalTitle = document.getElementById('downloadModalTitle');
        const downloadProgressBar = document.getElementById('downloadProgressBar');
        const downloadModalStatus = document.getElementById('downloadModalStatus');
        const cancelDownloadBtn = document.getElementById('cancelDownloadBtn');

        let isDownloading = false;
        let currentDownloadController = null;
        let ffmpegInstance = null;
        let ffmpegLoadFailed = false;

        function updateDownloadStatus(text) {
            downloadModalStatus.textContent = text;
        }

        function updateDownloadProgress(pct) {
            downloadProgressBar.style.width = pct + '%';
        }

        function showDownloadModal(title) {
            downloadModalTitle.textContent = title;
            downloadModal.classList.add('show');
        }

        function hideDownloadModal() {
            downloadModal.classList.remove('show');
            setTimeout(() => {
                updateDownloadProgress(0);
                updateDownloadStatus('Hazırlanıyor...');
            }, 300);
        }

        async function toBlobURL(url, mimeType) {
            const resp = await fetch(url);
            const blob = await resp.blob();
            return URL.createObjectURL(blob);
        }

        // Check if SharedArrayBuffer is available (required for FFmpeg WASM)
        function isSharedArrayBufferAvailable() {
            try {
                return typeof SharedArrayBuffer !== 'undefined';
            } catch (e) {
                return false;
            }
        }

        async function initFFmpeg() {
            if (ffmpegInstance) return ffmpegInstance;
            if (ffmpegLoadFailed) return null;

            try {
                if (typeof FFmpegWASM === 'undefined') {
                    console.error('[FFmpeg] FFmpegWASM global not found. Library may not have loaded.');
                    ffmpegLoadFailed = true;
                    return null;
                }

                const { FFmpeg } = FFmpegWASM;
                const ff = new FFmpeg();

                ff.on('log', ({ message }) => {
                    console.log('[FFmpeg]', message);
                });

                updateDownloadStatus('WebAssembly modülleri hazırlanıyor (ilk seferde biraz sürebilir)...');

                const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';

                const coreURL = await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript');
                const wasmURL = await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm');

                await ff.load({
                    coreURL,
                    wasmURL
                });

                ffmpegInstance = ff;
                console.log('[FFmpeg] Loaded successfully');
                return ffmpegInstance;
            } catch (error) {
                console.error('[FFmpeg] Load failed:', error);
                ffmpegLoadFailed = true;
                return null;
            }
        }

        async function startDownloadFlow(url, title) {
            if (isDownloading) return;
            isDownloading = true;
            currentDownloadController = new AbortController();

            showDownloadModal(title);
            updateDownloadProgress(0);

            try {
                updateDownloadStatus('Master çalma listesi çözümleniyor...');
                const mainUrl = url.substring(0, url.lastIndexOf('/') + 1);
                const response = await fetch(url, { signal: currentDownloadController.signal });
                const text = await response.text();

                const lines = text.split('\n');
                const streams = [];
                lines.forEach((line, index) => {
                    if (line.includes('RESOLUTION=')) {
                        const resolution = line.match(/RESOLUTION=(\d+x\d+)/)[1];
                        const height = parseInt(resolution.split('x')[1]);
                        const chunk = lines[index + 1].trim();
                        streams.push({ height, chunk });
                    }
                });

                let selectedChunk = 'playlist.m3u8';
                if (streams.length > 0) {
                    streams.sort((a, b) => b.height - a.height);
                    selectedChunk = streams[0].chunk;
                    updateDownloadStatus(`En yüksek kalite seçildi (${streams[0].height}p)...`);
                } else if (!text.includes('RESOLUTION=')) {
                    selectedChunk = url.substring(url.lastIndexOf('/') + 1);
                }

                const chunklistUrl = mainUrl + selectedChunk;

                updateDownloadStatus('Parça listesi indiriliyor...');
                const chunklistResponse = await fetch(chunklistUrl, { signal: currentDownloadController.signal });
                const chunklistText = await chunklistResponse.text();
                const chunklistLines = chunklistText.split('\n');

                const segments = [];
                chunklistLines.forEach(line => {
                    const trimmed = line.trim();
                    if (trimmed && !trimmed.startsWith('#')) {
                        segments.push(trimmed);
                    }
                });

                if (segments.length === 0) {
                    throw new Error('Hiç video parçası bulunamadı!');
                }

                updateDownloadStatus(`Toplam ${segments.length} parça indirilecek. Hazırlanıyor...`);

                const segmentDataList = new Array(segments.length);
                const concurrency = 5;
                let downloadedCount = 0;

                const chunkBaseUrl = chunklistUrl.substring(0, chunklistUrl.lastIndexOf('/') + 1);

                const downloadSegment = async (index) => {
                    const segmentName = segments[index];
                    const segmentUrl = segmentName.startsWith('http') ? segmentName : chunkBaseUrl + segmentName;

                    let attempts = 3;
                    while (attempts > 0) {
                        try {
                            const res = await fetch(segmentUrl, { signal: currentDownloadController.signal });
                            if (!res.ok) throw new Error(`HTTP error ${res.status}`);
                            const buffer = await res.arrayBuffer();
                            segmentDataList[index] = new Uint8Array(buffer);
                            break;
                        } catch (err) {
                            if (err.name === 'AbortError') throw err;
                            attempts--;
                            if (attempts === 0) throw err;
                            await new Promise(r => setTimeout(r, 1000));
                        }
                    }

                    downloadedCount++;
                    const pct = Math.round((downloadedCount / segments.length) * 80);
                    updateDownloadProgress(pct);
                    updateDownloadStatus(`Parçalar indiriliyor: %${Math.round((downloadedCount / segments.length) * 100)} (${downloadedCount}/${segments.length})`);
                };

                const queue = [...Array(segments.length).keys()];
                const workers = Array(concurrency).fill(null).map(async () => {
                    while (queue.length > 0) {
                        if (currentDownloadController.signal.aborted) break;
                        const idx = queue.shift();
                        await downloadSegment(idx);
                    }
                });

                await Promise.all(workers);
                if (currentDownloadController.signal.aborted) throw new DOMException('Aborted', 'AbortError');

                updateDownloadStatus('Parçalar birleştiriliyor...');
                updateDownloadProgress(85);

                let totalLength = 0;
                for (let i = 0; i < segmentDataList.length; i++) {
                    totalLength += segmentDataList[i].length;
                }

                const concatenated = new Uint8Array(totalLength);
                let offset = 0;
                for (let i = 0; i < segmentDataList.length; i++) {
                    concatenated.set(segmentDataList[i], offset);
                    offset += segmentDataList[i].length;
                    segmentDataList[i] = null;
                }

                // Try FFmpeg conversion, fallback to direct TS download
                let useFFmpeg = false;
                if (!ffmpegLoadFailed) {
                    updateDownloadStatus('FFmpeg başlatılıyor...');
                    updateDownloadProgress(90);
                    const ffmpeg = await initFFmpeg();
                    useFFmpeg = !!ffmpeg;
                }

                const safeName = title.replace(/[^a-zA-Z0-9\s\-_öüşçğıÖÜŞÇĞİ]/g, '').trim();

                if (useFFmpeg && ffmpegInstance) {
                    // FFmpeg available: convert TS → MP4
                    updateDownloadStatus('Veriler FFmpeg sistemine yazılıyor...');
                    await ffmpegInstance.writeFile('input.ts', concatenated);

                    updateDownloadStatus('MP4 formatına dönüştürülüyor (çok kısa sürecek)...');
                    updateDownloadProgress(95);

                    await ffmpegInstance.exec(['-i', 'input.ts', '-c', 'copy', 'output.mp4']);

                    updateDownloadStatus('Dosya hazırlandı, indiriliyor...');
                    const mp4Data = await ffmpegInstance.readFile('output.mp4');
                    const mp4Blob = new Blob([mp4Data.buffer], { type: 'video/mp4' });

                    const downloadUrl = URL.createObjectURL(mp4Blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = safeName + '.mp4';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(downloadUrl);

                    try {
                        await ffmpegInstance.deleteFile('input.ts');
                        await ffmpegInstance.deleteFile('output.mp4');
                    } catch (e) {
                        console.error('Temizleme hatası:', e);
                    }
                } else {
                    // Fallback: download as TS (most players can play .ts files)
                    updateDownloadStatus('MP4 dönüştürme kullanılamıyor, TS olarak indiriliyor...');
                    updateDownloadProgress(95);

                    const tsBlob = new Blob([concatenated.buffer], { type: 'video/mp2t' });
                    const downloadUrl = URL.createObjectURL(tsBlob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = safeName + '.ts';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(downloadUrl);
                }

                updateDownloadProgress(100);
                updateDownloadStatus('İndirme tamamlandı!');
                setTimeout(hideDownloadModal, 2000);

            } catch (error) {
                if (error.name === 'AbortError') {
                    updateDownloadStatus('İndirme iptal edildi.');
                } else {
                    console.error('İndirme hatası:', error);
                    updateDownloadStatus(`Hata oluştu: ${error.message || error}`);
                }
                setTimeout(hideDownloadModal, 3000);
            } finally {
                isDownloading = false;
                currentDownloadController = null;
            }
        }

        cancelDownloadBtn.addEventListener('click', () => {
            if (currentDownloadController) {
                currentDownloadController.abort();
            }
            hideDownloadModal();
        });

        function downloadVideo(url, title) {
            startDownloadFlow(url, title);
        }
    </script>
