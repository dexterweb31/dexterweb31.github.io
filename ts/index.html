<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Ders Platformu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #f1f1f1;
            min-height: 100vh;
        }

        /* Layout */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            gap: 24px;
            width: 100%;
        }

        .player-section {
            flex: 1;
            min-width: 0;
        }

        .sidebar {
            width: 400px;
            flex-shrink: 0;
        }

        /* Plyr Theme */
        .plyr-container {
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        :root {
            --plyr-color-main: #ff0000;
            --plyr-video-background: #000;
            --plyr-menu-background: #212121;
            --plyr-menu-color: #f1f1f1;
            --plyr-menu-border-color: rgba(255, 255, 255, 0.08);
            --plyr-badge-background: #ff0000;
            --plyr-badge-text-color: #fff;
            --plyr-control-icon-size: 20px;
            --plyr-tooltip-background: rgba(0, 0, 0, 0.85);
            --plyr-tooltip-color: #fff;
            --plyr-tooltip-radius: 6px;
            --plyr-font-family: 'Inter', sans-serif;
            --plyr-font-size-base: 14px;
            --plyr-font-size-small: 12px;
            --plyr-font-size-time: 13px;
            --plyr-range-thumb-height: 14px;
            --plyr-range-thumb-background: #fff;
            --plyr-range-track-height: 4px;
            --plyr-range-fill-background: #ff0000;
            --plyr-video-control-background-hover: rgba(255, 255, 255, 0.15);
            --plyr-video-controls-background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
        }

        .plyr__menu__container {
            background: #212121 !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
        }

        .plyr__menu__container .plyr__control {
            color: #eee !important;
            font-size: 13px;
        }

        .plyr__menu__container .plyr__control:hover,
        .plyr__menu__container .plyr__control:focus {
            background: rgba(255, 255, 255, 0.1) !important;
        }

        .plyr__menu__container .plyr__control[aria-checked="true"]::before {
            background: #3ea6ff !important;
        }

        .plyr__menu__container .plyr__control--back {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            font-weight: 600;
        }

        .plyr--video {
            border-radius: 12px;
            overflow: hidden;
        }

        .plyr__controls__item.plyr__time {
            font-variant-numeric: tabular-nums;
        }

        /* Video Info */
        .video-info {
            padding: 16px 0;
        }

        .video-title {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.4;
            color: #f1f1f1;
        }

        .video-meta {
            font-size: 13px;
            color: #aaa;
            margin-top: 6px;
        }

        /* Sidebar */
        .sidebar-section {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .sidebar-header {
            padding: 14px 16px;
            font-size: 15px;
            font-weight: 600;
            color: #f1f1f1;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-header svg {
            width: 18px;
            height: 18px;
            fill: #3ea6ff;
        }

        .instructor-select {
            width: 100%;
            padding: 10px 16px;
            background: #272727;
            color: #f1f1f1;
            border: none;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            outline: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .instructor-select:focus {
            background: #333;
        }

        .instructor-select option {
            background: #272727;
            color: #f1f1f1;
        }

        /* Lesson List */
        .lesson-list {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #555 transparent;
        }

        .lesson-list::-webkit-scrollbar {
            width: 6px;
        }

        .lesson-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .lesson-list::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 3px;
        }

        .lesson-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
        }

        .lesson-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .lesson-item.active {
            background: rgba(62, 166, 255, 0.08);
            border-left-color: #3ea6ff;
        }

        .lesson-number {
            font-size: 13px;
            color: #717171;
            min-width: 22px;
            padding-top: 2px;
            text-align: center;
        }

        .lesson-details {
            flex: 1;
            min-width: 0;
        }

        .lesson-title {
            font-size: 13px;
            font-weight: 500;
            color: #f1f1f1;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .lesson-meta {
            font-size: 12px;
            color: #717171;
            margin-top: 3px;
        }

        .lesson-playing-icon {
            display: none;
            width: 14px;
            height: 14px;
            margin-top: 2px;
        }

        .lesson-item.active .lesson-playing-icon {
            display: block;
        }

        .lesson-item.active .lesson-number {
            display: none;
        }

        /* Empty State */
        .empty-state {
            padding: 40px 16px;
            text-align: center;
            color: #717171;
            font-size: 13px;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            fill: #333;
            margin-bottom: 12px;
        }

        /* Download Button */
        .lesson-download {
            background: none;
            border: none;
            padding: 6px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.15s;
            flex-shrink: 0;
            opacity: 0;
        }

        .lesson-item:hover .lesson-download {
            opacity: 1;
        }

        .lesson-download:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }

        .lesson-download svg {
            width: 18px;
            height: 18px;
            fill: #aaa;
            transition: fill 0.15s;
        }

        .lesson-download:hover svg {
            fill: #3ea6ff;
        }

        /* Download Modal */
        .dl-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(8px);
        }

        .dl-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .dl-modal {
            background: #1f1f1f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .dl-overlay.show .dl-modal {
            transform: scale(1);
        }

        .dl-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
        }

        .dl-status {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 20px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }

        .dl-bar-wrap {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .dl-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3ea6ff, #0056b3);
            border-radius: 4px;
            transition: width 0.2s ease;
        }

        .dl-cancel {
            background: #272727;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.15s, border-color 0.15s;
        }

        .dl-cancel:hover {
            background: #3f3f3f;
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                flex-direction: column;
                padding: 12px;
            }

            .sidebar {
                width: 100%;
            }

            .lesson-list {
                max-height: 400px;
            }
        }

        @media (max-width: 640px) {
            .main-content {
                padding: 0;
            }

            .plyr-container,
            .plyr--video {
                border-radius: 0;
            }

            .video-info {
                padding: 12px;
            }

            .sidebar {
                padding: 0 8px;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div class="main-content">
            <div class="player-section">
                <div class="plyr-container">
                    <video id="player" playsinline></video>
                </div>
                <div class="video-info">
                    <div class="video-title" id="videoTitle">Bir ders seçin</div>
                    <div class="video-meta" id="videoMeta"></div>
                </div>
            </div>

            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-header">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                        </svg>
                        Eğitmen
                    </div>
                    <select id="instructorSelect" class="instructor-select">
                        <option value="">Eğitmen seçin...</option>
                    </select>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-header">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z" />
                        </svg>
                        Dersler
                    </div>
                    <div class="lesson-list" id="lessonList">
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24">
                                <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z" />
                            </svg>
                            <p>Ders listesini görmek için bir eğitmen seçin</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Download Modal -->
    <div class="dl-overlay" id="dlOverlay">
        <div class="dl-modal">
            <div class="dl-title" id="dlTitle">Video İndiriliyor</div>
            <div class="dl-bar-wrap">
                <div class="dl-bar" id="dlBar"></div>
            </div>
            <div class="dl-status" id="dlStatus">Hazırlanıyor...</div>
            <button class="dl-cancel" id="dlCancel">İptal Et</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        // ==================== CONFIG ====================
        const INSTRUCTORS = [
            'Ahmet_Atilla_Yilmazer', 'Ali_Sacan', 'All_Star_Ogretmeni',
            'Altug_Gunes', 'Baris_Kapan', 'Bayram_Meral',
            'Betul_Buyukkalayci', 'Burak_Onay', 'Busra_Altinok',
            'Celal_Gunduz', 'Deniz_Bozkurt', 'Deniz_Ongel',
            'Didar_Baskin', 'Enes_Avci', 'Enise_Ozdemir',
            'Erdal_Aydemir', 'Erkan_Ayranci', 'Erkan_Tuncer',
            'Eyup_Boncuk', 'Fatih_Demirkaya', 'Fatih_Vural',
            'Ferda_Kurnaz_Karagoz', 'Gorkem_Sahin', 'Gri_Koc',
            'Gulhan_Sen', 'Hale_Karatas', 'Hilmi_Yavuz',
            'Ibrahim_Turker', 'Ibrahim_Ulas_Baldemir', 'Ilhan_Aslan',
            'Ilyas_Gunes', 'Ismail_Kocabas', 'Ismail_Tolga_Aktas',
            'Kader_Altinel', 'Kadir_Gumus', 'Kanan_Kara',
            'Kemal_Coskun', 'Kenan_Kara', 'Mahsum_Ozturk',
            'Mehmet_Celal_Ozyildiz', 'Mehmet_Dural', 'Mehmet_Durmus',
            'Mesut_Ugurdogan', 'Murat_Namli', 'Mustafa_Ozturk',
            'Mustafa_Yagci', 'Nagihan_Hoca', 'Nurtac_Kozak',
            'Nurten_Aydin', 'Oktay_Duran', 'Onay_CEPE',
            'Onur_Soguk', 'Ozcan_Aykin', 'Ozer_Akgumus',
            'Ozlem_Penekli', 'Oznur_Saat_Yildirim', 'Rabia_Nalan_Cinar',
            'Recep_Ustunel', 'Rustu_Bayindir', 'Salih_Yildirir',
            'Selim_Yuksel', 'Selma_Kalemci', 'Semih_Akpinar',
            'Senol_Aydin', 'Sercan_Dural', 'Sinan_Aydin',
            'Sukru_Akkoyun', 'Uzay_Aslanturk', 'Veysel_Boynuegri',
            'Yavuz_Tuna', 'Yunus_Turan'
        ];

        const PLYR_I18N = {
            restart: 'Baştan Başlat',
            rewind: '{seektime} saniye geri',
            play: 'Oynat',
            pause: 'Duraklat',
            fastForward: '{seektime} saniye ileri',
            seek: 'Ara',
            seekLabel: '{currentTime} / {duration}',
            played: 'Oynatıldı',
            buffered: 'Tamponlandı',
            currentTime: 'Şu anki zaman',
            duration: 'Süre',
            volume: 'Ses',
            mute: 'Sesi Kapat',
            unmute: 'Sesi Aç',
            download: 'İndir',
            enterFullscreen: 'Tam Ekran',
            exitFullscreen: 'Tam Ekrandan Çık',
            settings: 'Ayarlar',
            menuBack: 'Geri',
            speed: 'Hız',
            normal: 'Normal',
            quality: 'Kalite',
            loop: 'Döngü',
            start: 'Başlangıç',
            end: 'Bitiş',
            all: 'Tümü',
            reset: 'Sıfırla',
            disabled: 'Kapalı',
            enabled: 'Açık',
            qualityBadge: {
                2160: '4K',
                1440: 'HD',
                1080: 'HD',
                720: 'HD',
                576: 'SD',
                480: 'SD',
            },
        };

        // ==================== STATE ====================
        let hls = null;
        let player = null;
        let streamUrl = '';
        let lessons = [];
        let activeIndex = -1;

        // ==================== DOM ====================
        const videoEl = document.getElementById('player');
        const titleEl = document.getElementById('videoTitle');
        const metaEl = document.getElementById('videoMeta');
        const selectEl = document.getElementById('instructorSelect');
        const listEl = document.getElementById('lessonList');

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            // Populate instructor dropdown
            INSTRUCTORS.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name + '.json';
                opt.textContent = name.replaceAll('_', ' ');
                selectEl.appendChild(opt);
            });

            selectEl.addEventListener('change', loadLessons);

            // Create initial Plyr (no video yet)
            player = createPlyr();
        });

        // ==================== PLYR ====================
        function createPlyr(qualityOpts) {
            const opts = {
                controls: [
                    'play-large', 'rewind', 'play', 'fast-forward',
                    'progress', 'current-time', 'duration',
                    'mute', 'volume', 'settings', 'download', 'fullscreen'
                ],
                settings: ['quality', 'speed'],
                speed: { selected: 1, options: [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
                tooltips: { controls: true, seek: true },
                keyboard: { focused: true, global: true },
                seekTime: 10,
                urls: { download: null },
                i18n: PLYR_I18N,
            };

            if (qualityOpts) {
                opts.quality = qualityOpts;
            }

            const p = new Plyr(videoEl, opts);

            // Override download button → use our download pipeline
            const container = p.elements.container;
            const dlBtn = container && container.querySelector('[data-plyr="download"]');
            if (dlBtn) {
                dlBtn.addEventListener('click', e => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!streamUrl) return alert('Önce bir ders seçin');
                    download(streamUrl, titleEl.textContent || 'video');
                });
            }

            return p;
        }

        // ==================== LESSONS ====================
        async function loadLessons() {
            if (!selectEl.value) return;
            listEl.innerHTML = '<div class="empty-state"><p>Yükleniyor...</p></div>';

            try {
                const res = await fetch(selectEl.value);
                lessons = await res.json();
                activeIndex = -1;
                renderLessons();
            } catch {
                listEl.innerHTML = '<div class="empty-state"><p>Ders bilgileri yüklenemedi!</p></div>';
            }
        }

        function renderLessons() {
            listEl.innerHTML = '';
            lessons.forEach((lesson, i) => {
                const el = document.createElement('div');
                el.className = 'lesson-item' + (i === activeIndex ? ' active' : '');
                el.innerHTML = `
                    <span class="lesson-number">${i + 1}</span>
                    <svg class="lesson-playing-icon" viewBox="0 0 24 24" fill="#3ea6ff"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                    <div class="lesson-details">
                        <div class="lesson-title">${lesson.title}</div>
                        <div class="lesson-meta">${lesson.instructor_name} · ${lesson.duration}</div>
                    </div>
                    <button class="lesson-download" title="İndir">
                        <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zM19 9h-4V3H9v6H5l7 7 7-7z"/></svg>
                    </button>`;

                // Play on click
                el.addEventListener('click', () => playLesson(i));

                // Download on button click
                el.querySelector('.lesson-download').addEventListener('click', e => {
                    e.stopPropagation();
                    download(lesson.stream_url, lesson.title);
                });

                listEl.appendChild(el);
            });
        }

        function playLesson(index) {
            const lesson = lessons[index];
            activeIndex = index;
            streamUrl = lesson.stream_url;
            titleEl.textContent = lesson.title;
            metaEl.textContent = `${lesson.instructor_name} · ${lesson.duration}`;
            loadStream(lesson.stream_url);
            renderLessons();
        }

        // ==================== HLS ====================
        function loadStream(url) {
            // Clean up previous
            if (hls) { hls.destroy(); hls = null; }
            if (player) { player.destroy(); player = null; }

            // Get fresh video element ref (Plyr.destroy restores original)
            const vid = document.getElementById('player');

            if (!Hls.isSupported()) {
                // Safari native HLS
                vid.src = url;
                player = createPlyr();
                vid.addEventListener('loadedmetadata', () => vid.play().catch(() => {}), { once: true });
                return;
            }

            hls = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60 });
            hls.loadSource(url);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                // Extract quality levels
                const heights = [...new Set(hls.levels.map(l => l.height))].sort((a, b) => b - a);

                player = createPlyr({
                    default: heights[0],
                    options: heights,
                    forced: true,
                    onChange: q => {
                        const idx = hls.levels.findIndex(l => l.height === q);
                        if (idx !== -1) hls.currentLevel = idx;
                    }
                });

                vid.play().catch(() => {});
            });

            hls.on(Hls.Events.ERROR, (_, data) => {
                if (!data.fatal) return;
                if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                else hls.destroy();
            });

            hls.attachMedia(vid);
        }

        // ==================== DOWNLOAD ====================
        let downloading = false;
        let abortCtrl = null;

        const dlOverlay = document.getElementById('dlOverlay');
        const dlTitle = document.getElementById('dlTitle');
        const dlBar = document.getElementById('dlBar');
        const dlStatus = document.getElementById('dlStatus');
        const dlCancel = document.getElementById('dlCancel');

        dlCancel.addEventListener('click', () => {
            if (abortCtrl) abortCtrl.abort();
            hideModal();
        });

        function showModal(title) {
            dlTitle.textContent = title;
            dlBar.style.width = '0%';
            dlStatus.textContent = 'Hazırlanıyor...';
            dlOverlay.classList.add('show');
        }

        function hideModal() {
            dlOverlay.classList.remove('show');
        }

        function setProgress(pct, text) {
            dlBar.style.width = pct + '%';
            if (text) dlStatus.textContent = text;
        }

        async function download(masterUrl, title) {
            if (downloading) return;
            downloading = true;
            abortCtrl = new AbortController();
            const signal = abortCtrl.signal;

            showModal(title);

            try {
                // 1. Fetch master playlist
                setProgress(0, 'Çalma listesi çözümleniyor...');
                const baseUrl = masterUrl.substring(0, masterUrl.lastIndexOf('/') + 1);
                const masterText = await (await fetch(masterUrl, { signal })).text();

                // 2. Pick highest quality chunklist
                const lines = masterText.split('\n');
                const streams = [];
                lines.forEach((line, i) => {
                    if (line.includes('RESOLUTION=')) {
                        const h = parseInt(line.match(/RESOLUTION=\d+x(\d+)/)[1]);
                        streams.push({ height: h, chunk: lines[i + 1].trim() });
                    }
                });

                let chunkPath;
                if (streams.length > 0) {
                    streams.sort((a, b) => b.height - a.height);
                    chunkPath = streams[0].chunk;
                    setProgress(5, `En yüksek kalite: ${streams[0].height}p`);
                } else {
                    chunkPath = masterUrl.substring(masterUrl.lastIndexOf('/') + 1);
                }

                // 3. Fetch chunklist
                const chunkUrl = baseUrl + chunkPath;
                const chunkBase = chunkUrl.substring(0, chunkUrl.lastIndexOf('/') + 1);
                const chunkText = await (await fetch(chunkUrl, { signal })).text();

                const segments = chunkText.split('\n')
                    .map(l => l.trim())
                    .filter(l => l && !l.startsWith('#'));

                if (!segments.length) throw new Error('Segment bulunamadı');

                // 4. Download all segments in parallel
                const total = segments.length;
                const data = new Array(total);
                let done = 0;
                const WORKERS = 5;

                const queue = segments.map((_, i) => i);

                async function worker() {
                    while (queue.length) {
                        if (signal.aborted) return;
                        const i = queue.shift();
                        const url = segments[i].startsWith('http') ? segments[i] : chunkBase + segments[i];

                        for (let attempt = 0; attempt < 3; attempt++) {
                            try {
                                const res = await fetch(url, { signal });
                                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                                data[i] = new Uint8Array(await res.arrayBuffer());
                                break;
                            } catch (err) {
                                if (err.name === 'AbortError') throw err;
                                if (attempt === 2) throw err;
                                await new Promise(r => setTimeout(r, 1000));
                            }
                        }

                        done++;
                        const pct = 10 + Math.round((done / total) * 85);
                        setProgress(pct, `İndiriliyor: ${done}/${total} (%${Math.round(done / total * 100)})`);
                    }
                }

                await Promise.all(Array.from({ length: WORKERS }, worker));
                if (signal.aborted) return;

                // 5. Concatenate & save
                setProgress(96, 'Dosya oluşturuluyor...');

                let size = 0;
                for (const d of data) size += d.length;

                const merged = new Uint8Array(size);
                let offset = 0;
                for (let i = 0; i < data.length; i++) {
                    merged.set(data[i], offset);
                    offset += data[i].length;
                    data[i] = null; // free memory
                }

                const blob = new Blob([merged.buffer], { type: 'video/mp2t' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = title.replace(/[^a-zA-Z0-9\s\-_öüşçğıÖÜŞÇĞİ]/g, '').trim() + '.ts';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);

                setProgress(100, 'İndirme tamamlandı!');
                setTimeout(hideModal, 1500);

            } catch (err) {
                if (err.name === 'AbortError') {
                    dlStatus.textContent = 'İptal edildi.';
                } else {
                    console.error('Download error:', err);
                    dlStatus.textContent = `Hata: ${err.message}`;
                }
                setTimeout(hideModal, 2500);
            } finally {
                downloading = false;
                abortCtrl = null;
            }
        }
    </script>
</body>
