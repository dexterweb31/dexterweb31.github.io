<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ders video platformu - Online eğitim videoları">
    <title>Ders Video Platformu</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">

    <style>
        /* ====== CSS Reset & Variables ====== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #eef1f6;
            --bg-card: #ffffff;
            --bg-hover: #e8ecf3;
            --bg-active: #dce4f8;
            --text-primary: #1a1a2e;
            --text-secondary: #5a6278;
            --text-muted: #9098a9;
            --accent: #4675ee;
            --accent-light: #7da3f5;
            --accent-glow: rgba(70, 117, 238, 0.15);
            --accent-gradient: linear-gradient(135deg, #4675ee, #7da3f5);
            --success: #00b894;
            --warning: #fdcb6e;
            --border: rgba(0, 0, 0, 0.08);
            --border-active: rgba(70, 117, 238, 0.4);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 30px rgba(70, 117, 238, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ====== Scrollbar ====== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #c5cad4;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9098a9;
        }

        /* ====== Header ====== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent-gradient);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: var(--shadow-glow);
        }

        .header-stats {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .stat-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .stat-badge .count {
            color: var(--accent-light);
            font-weight: 600;
        }

        /* ====== Main Layout ====== */
        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr 380px;
            height: calc(100vh - 64px);
        }

        /* ====== Sidebar (Instructors) ====== */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            transition: var(--transition);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
            pointer-events: none;
        }

        .instructor-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .instructor-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            margin-bottom: 2px;
        }

        .instructor-item:hover {
            background: var(--bg-hover);
            border-color: var(--border);
        }

        .instructor-item.active {
            background: var(--bg-active);
            border-color: var(--border-active);
            box-shadow: var(--shadow-glow);
        }

        .instructor-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
            color: #fff;
            text-transform: uppercase;
        }

        .instructor-info {
            flex: 1;
            min-width: 0;
        }

        .instructor-name {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .instructor-count {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ====== Player Area ====== */
        .player-area {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .player-container {
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
            width: 100%;
            flex-shrink: 0;
        }

        .player-container video {
            width: 100%;
            height: 100%;
        }

        /* Plyr Overrides */
        .plyr {
            --plyr-color-main: #4675ee;
            --plyr-video-background: #000;
            --plyr-menu-background: rgba(255, 255, 255, 0.97);
            --plyr-menu-color: #1a1a2e;
            --plyr-menu-border-color: rgba(0, 0, 0, 0.08);
            --plyr-menu-radius: 10px;
            --plyr-menu-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            --plyr-badge-background: #4675ee;
            --plyr-badge-text-color: #fff;
            --plyr-control-icon-size: 18px;
            --plyr-range-fill-background: #4675ee;
            --plyr-video-control-color: #fff;
            --plyr-video-control-background-hover: rgba(70, 117, 238, 0.3);
            border-radius: 0;
        }

        .plyr__menu__container {
            backdrop-filter: blur(12px);
        }

        /* Video Info Bar */
        .video-info-bar {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .video-title-main {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .video-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .video-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .video-meta-item .icon {
            font-size: 0.9rem;
        }

        .quality-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            background: var(--accent-gradient);
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #fff;
        }

        /* ====== Playlist Panel ====== */
        .playlist-panel {
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .playlist-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .playlist-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .playlist-title {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .playlist-count-badge {
            background: var(--bg-tertiary);
            color: var(--accent-light);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 600;
        }

        .playlist-search {
            width: 100%;
            margin-top: 12px;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.82rem;
            outline: none;
            transition: var(--transition);
        }

        .playlist-search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .playlist-search::placeholder {
            color: var(--text-muted);
        }

        .playlist-items {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            margin-bottom: 2px;
        }

        .playlist-item:hover {
            background: var(--bg-hover);
            border-color: var(--border);
        }

        .playlist-item.active {
            background: var(--bg-active);
            border-color: var(--border-active);
        }

        .playlist-item.active .playlist-item-index {
            background: var(--accent-gradient);
            color: #fff;
            border-color: transparent;
        }

        .playlist-item-index {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            border: 1px solid var(--border);
            flex-shrink: 0;
            transition: var(--transition);
        }

        .playlist-item.active .playlist-item-index::after {
            content: '▶';
            font-size: 0.55rem;
        }

        .playlist-item.active .playlist-item-index .idx-num {
            display: none;
        }

        .playlist-item-info {
            flex: 1;
            min-width: 0;
        }

        .playlist-item-title {
            font-size: 0.82rem;
            font-weight: 500;
            line-height: 1.4;
        }

        .playlist-item-duration {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ====== Welcome State ====== */
        .welcome-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: var(--accent-gradient);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 20px;
            box-shadow: var(--shadow-glow);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .welcome-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            max-width: 300px;
        }

        /* ====== Empty Playlist ====== */
        .empty-playlist {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .empty-playlist .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-playlist p {
            font-size: 0.85rem;
        }

        /* ====== Loading Spinner ====== */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(70, 117, 238, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ====== Responsive ====== */
        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 260px 1fr 320px;
            }
        }

        @media (max-width: 960px) {
            .main-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                height: auto;
            }

            .sidebar {
                display: none;
            }

            .playlist-panel {
                border-left: none;
                border-top: 1px solid var(--border);
                max-height: 50vh;
            }

            .header-stats {
                display: none;
            }

            /* Mobile instructor selector */
            .mobile-instructor-select {
                display: block !important;
            }
        }

        .mobile-instructor-select {
            display: none;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .mobile-instructor-select select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
        }

        /* ====== Fade-in animation ====== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease forwards;
        }
    </style>
</head>

    <!-- Header -->
    <header class="header" id="header">
        <div class="logo">
            <div class="logo-icon">🎓</div>
            <span>Ders Videoları</span>
        </div>
        <div class="header-stats">
            <div class="stat-badge">
                <span>👨‍🏫</span>
                <span id="total-instructors" class="count">0</span>
                <span>Eğitmen</span>
            </div>
            <div class="stat-badge">

            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <main class="main-layout" id="main-layout">

        <!-- Sidebar: Instructor List -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Eğitmenler</div>
                <div class="search-box">
                    <input type="text" id="instructor-search" placeholder="Eğitmen ara...">
                </div>
            </div>
            <div class="instructor-list" id="instructor-list"></div>
        </aside>

        <!-- Player Area -->
        <section class="player-area" id="player-area">
            <!-- Mobile instructor selector -->
            <div class="mobile-instructor-select">
                <select id="mobile-instructor-dropdown">
                    <option value="">Eğitmen seçin...</option>
                </select>
            </div>

            <div class="player-container" id="player-container">

                    <div class="welcome-icon">▶</div>
                    <h1 class="welcome-title">Hoş Geldiniz</h1>
                    <p class="welcome-text">Sol panelden bir eğitmen seçerek ders videolarını izlemeye başlayın.</p>

                <video id="player" playsinline controls crossorigin style="display:none;"></video>
            </div>
            <div class="video-info-bar" id="video-info-bar" style="display:none;">

                        <span id="current-duration">—</span>
                    </div>
                    <div class="video-meta-item" id="quality-display">
                        <span class="quality-badge" id="current-quality">Auto</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Playlist Panel -->
        <aside class="playlist-panel" id="playlist-panel">
            <div class="playlist-header">
                <div>
                    <div class="playlist-title-row">
                        <span class="playlist-title" id="playlist-title">Video Listesi</span>
                        <span class="playlist-count-badge" id="playlist-count">0</span>
                    </div>
                    <input type="text" class="playlist-search" id="playlist-search" placeholder="Video ara...">
                </div>
            </div>
            <div class="playlist-items" id="playlist-items">
                <div class="empty-playlist">
                    <div class="empty-icon">📚</div>
                    <p>Bir eğitmen seçerek<br>videoları görüntüleyin</p>
                </div>
            </div>
        </aside>
    </main>

            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
        }

        function getInitials(name) {
            return name.split(/[_ ]+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
        }

        function formatInstructorName(fileName) {
            return fileName.replace('.json', '').replace(/_/g, ' ');
        }

        // ====== Init Plyr + HLS ======
        function initPlayer() {
            const video = document.getElementById('player');

            // Default quality options for Plyr
            const defaultQualityOptions = {
                default: -1, // auto
                options: [],
                forced: true,
                onChange: (quality) => updateQuality(quality),
            };

            state.player = new Plyr(video, {
                controls: [
                    'play-large', 'rewind', 'play', 'fast-forward',
                    'progress', 'current-time', 'duration', 'mute',
                    'volume', 'settings', 'pip', 'airplay', 'fullscreen'
                ],
                settings: ['quality', 'speed'],
                quality: defaultQualityOptions,
                speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
                keyboard: { focused: true, global: true },
                tooltips: { controls: true, seek: true },
                i18n: {
                    restart: 'Yeniden Başlat',
                    rewind: '{seektime} saniye geri',
                    play: 'Oynat',
                    pause: 'Duraklat',
                    fastForward: '{seektime} saniye ileri',
                    seek: 'Ara',
                    seekLabel: '{currentTime} / {duration}',
                    played: 'Oynandı',
                    buffered: 'Tamponlandı',
                    currentTime: 'Geçen süre',
                    duration: 'Süre',
                    volume: 'Ses',
                    mute: 'Sessiz',
                    unmute: 'Sesi Aç',
                    enableCaptions: 'Altyazıları Aç',
                    disableCaptions: 'Altyazıları Kapat',
                    download: 'İndir',
                    enterFullscreen: 'Tam Ekran',
                    exitFullscreen: 'Tam Ekrandan Çık',
                    frameTitle: 'Video oynatıcı',
                    captions: 'Altyazılar',
                    settings: 'Ayarlar',
                    pip: 'Küçük Ekran',
                    menuBack: 'Geri',
                    speed: 'Hız',
                    normal: 'Normal',
                    quality: 'Kalite',
                    loop: 'Döngü',
                    start: 'Başlangıç',
                    end: 'Bitiş',
                    all: 'Tümü',
                    reset: 'Sıfırla',
                    disabled: 'Devre Dışı',
                    enabled: 'Etkin',
                    advertisement: 'Reklam',
                    qualityBadge: {
                        2160: '4K',
                        1440: 'QHD',
                        1080: 'FHD',
                        720: 'HD',
                        576: 'SD',
                        480: 'SD',
                        360: 'LD',
                        240: 'LD',
                    },
                },
            });

            // Auto-play next video when current ends
            state.player.on('ended', () => {
                if (state.currentVideoIndex < state.videos.length - 1) {
                    playVideo(state.currentVideoIndex + 1);
                }
            });
        }

        function updateQuality(newQuality) {
            if (state.hls) {
                if (newQuality === 0) {
                    // Auto quality
                    state.hls.currentLevel = -1;
                    document.getElementById('current-quality').textContent = 'Auto';
                } else {
                    state.hls.levels.forEach((level, levelIndex) => {
                        if (level.height === newQuality) {
                            state.hls.currentLevel = levelIndex;
                        }
                    });
                    document.getElementById('current-quality').textContent = newQuality + 'p';
                }
            }
        }

        // ====== Load HLS Stream ======
        function loadStream(url) {
            const video = document.getElementById('player');

            // Destroy previous HLS instance
            if (state.hls) {
                state.hls.destroy();
                state.hls = null;
            }

            // Show player, hide welcome
            document.getElementById('welcome-state').style.display = 'none';
            video.style.display = 'block';
            document.getElementById('video-info-bar').style.display = 'block';

            if (Hls.isSupported()) {
                const hls = new Hls({
                    maxBufferLength: 30,
                    maxMaxBufferLength: 60,
                });
                state.hls = hls;

                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
                    // Build quality options from HLS levels
                    const availableQualities = hls.levels.map(l => l.height);
                    availableQualities.unshift(0); // Add "Auto" option (0)

                    // Update Plyr quality options
                    state.player.quality = -1; // Reset

                    // Reinitialize quality menu
                    state.qualityOptions = availableQualities;

                    // Rebuild Plyr with quality options
                    state.player.config.quality = {
                        default: 0,
                        options: availableQualities,
                        forced: true,
                        onChange: (quality) => updateQuality(quality),
                    };

                    // Hack: trigger Plyr to re-render quality menu
                    // We need to destroy and reinit Plyr with quality settings
                    rebuildPlayerWithQualities(availableQualities);

                    // Start playback
                    video.play().catch(() => { });

                    // Update quality badge
                    document.getElementById('current-quality').textContent = 'Auto';
                });

                hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
                    const level = hls.levels[data.level];
                    if (level) {
                        const qualityText = hls.autoLevelEnabled
                            ? `Auto (${level.height}p)`
                            : `${level.height}p`;
                        document.getElementById('current-quality').textContent = qualityText;
                    }
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Native HLS support (Safari)
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(() => { });
                });
            }
        }

        function rebuildPlayerWithQualities(qualities) {
            const video = document.getElementById('player');

            // Store current time and playing state
            const currentTime = video.currentTime || 0;
            const wasPlaying = !video.paused;

            if (state.player) {
                state.player.destroy();
            }

            state.player = new Plyr(video, {
                controls: [
                    'play-large', 'rewind', 'play', 'fast-forward',
                    'progress', 'current-time', 'duration', 'mute',
                    'volume', 'settings', 'pip', 'airplay', 'fullscreen'
                ],
                settings: ['quality', 'speed'],
                quality: {
                    default: 0,
                    options: qualities,
                    forced: true,
                    onChange: (quality) => updateQuality(quality),
                },
                speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
                keyboard: { focused: true, global: true },
                tooltips: { controls: true, seek: true },
                i18n: {
                    quality: 'Kalite',
                    speed: 'Hız',
                    normal: 'Normal',
                    settings: 'Ayarlar',
                    menuBack: 'Geri',
                    qualityBadge: {
                        2160: '4K',
                        1440: 'QHD',
                        1080: 'FHD',
                        720: 'HD',
                        576: 'SD',
                        480: 'SD',
                        360: 'LD',
                        240: 'LD',
                        0: 'Auto',
                    },
                },
            });

            // Re-attach ended event
            state.player.on('ended', () => {
                if (state.currentVideoIndex < state.videos.length - 1) {
                    playVideo(state.currentVideoIndex + 1);
                }
            });

            // Restore time
            if (currentTime > 0) {
                video.currentTime = currentTime;
            }
            if (wasPlaying) {
                video.play().catch(() => { });
            }
        }

        // ====== Load Instructors ======
        async function loadInstructors() {
            const instructorMap = new Map();
            let totalVideoCount = 0;

            // Load counts from each JSON
            const promises = JSON_FILES.map(async (fileName) => {
                try {
                    const resp = await fetch(fileName);
                    const data = await resp.json();
                    const displayName = data.length > 0 && data[0].instructor_name
                        ? data[0].instructor_name
                        : formatInstructorName(fileName);
                    instructorMap.set(fileName, {
                        name: displayName,
                        fileName: fileName,
                        videoCount: data.length
                    });
                    totalVideoCount += data.length;
                } catch (e) {
                    // Skip invalid files
                }
            });

            await Promise.all(promises);

            // Sort alphabetically
            state.instructors = Array.from(instructorMap.values())
                .sort((a, b) => a.name.localeCompare(b.name, 'tr'));

            // Update stats
            document.getElementById('total-instructors').textContent = state.instructors.length;
            document.getElementById('total-videos').textContent = totalVideoCount;

            renderInstructorList();
            renderMobileDropdown();
        }

        // ====== Render Instructor List ======
        function renderInstructorList(filter = '') {
            const container = document.getElementById('instructor-list');
            const filtered = state.instructors.filter(i =>
                i.name.toLowerCase().includes(filter.toLowerCase())
            );

            container.innerHTML = filtered.map((instructor, idx) => `
                <div class="instructor-item fade-in ${state.currentInstructor === instructor.fileName ? 'active' : ''}"
                     data-file="${instructor.fileName}"
                     onclick="selectInstructor('${instructor.fileName}')"
                     style="animation-delay: ${idx * 20}ms">
                    <div class="instructor-avatar" style="background: ${getAvatarColor(instructor.name)}">
                        ${getInitials(instructor.name)}
                    </div>
                    <div class="instructor-info">
                        <div class="instructor-name">${instructor.name}</div>
                        <div class="instructor-count">${instructor.videoCount} video</div>
                    </div>
                </div>
            `).join('');
        }

        // ====== Mobile Dropdown ======
        function renderMobileDropdown() {
            const dropdown = document.getElementById('mobile-instructor-dropdown');
            dropdown.innerHTML = '<option value="">Eğitmen seçin...</option>' +
                state.instructors.map(i =>
                    `<option value="${i.fileName}">${i.name} (${i.videoCount})</option>`
                ).join('');
        }

        // ====== Select Instructor ======
        async function selectInstructor(fileName) {
            state.currentInstructor = fileName;
            state.currentVideoIndex = -1;

            // Update active state in sidebar
            document.querySelectorAll('.instructor-item').forEach(el => {
                el.classList.toggle('active', el.dataset.file === fileName);
            });

            // Update mobile dropdown
            document.getElementById('mobile-instructor-dropdown').value = fileName;

            // Load videos
            try {
                const resp = await fetch(fileName);
                state.videos = await resp.json();
            } catch (e) {
                state.videos = [];
            }

            // Update playlist
            const instructor = state.instructors.find(i => i.fileName === fileName);
            document.getElementById('playlist-title').textContent = instructor ? instructor.name : 'Video Listesi';
            document.getElementById('playlist-count').textContent = state.videos.length;

            renderPlaylist();

            // Auto-play first video
            if (state.videos.length > 0) {
                playVideo(0);
            }
        }

        // ====== Render Playlist ======
        function renderPlaylist(filter = '') {
            const container = document.getElementById('playlist-items');
            const filtered = state.videos
                .map((v, i) => ({ ...v, originalIndex: i }))
                .filter(v => v.title.toLowerCase().includes(filter.toLowerCase()));

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-playlist">
                        <div class="empty-icon">🔍</div>
                        <p>${filter ? 'Sonuç bulunamadı' : 'Video bulunamadı'}</p>
                    </div>`;
                return;
            }

            container.innerHTML = filtered.map((video, displayIdx) => `
                <div class="playlist-item fade-in ${video.originalIndex === state.currentVideoIndex ? 'active' : ''}"
                     onclick="playVideo(${video.originalIndex})"
                     style="animation-delay: ${displayIdx * 15}ms">
                    <div class="playlist-item-index">
                        <span class="idx-num">${video.originalIndex + 1}</span>
                    </div>
                    <div class="playlist-item-info">
                        <div class="playlist-item-title">${video.title}</div>
                        <div class="playlist-item-duration">
                            <span>⏱</span> ${video.duration}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ====== Play Video ======
        function playVideo(index) {
            if (index < 0 || index >= state.videos.length) return;

            state.currentVideoIndex = index;
            const video = state.videos[index];

            // Update info bar
            document.getElementById('current-video-title').textContent = video.title;
            document.getElementById('current-instructor').textContent = video.instructor_name;
            document.getElementById('current-duration').textContent = video.duration;

            // Load the stream
            loadStream(video.stream_url);

            // Update active states in playlist
            document.querySelectorAll('.playlist-item').forEach((el, i) => {
                // We need to check by onclick content match
                el.classList.remove('active');
            });
            renderPlaylist(document.getElementById('playlist-search').value);

            // Scroll active item into view
            setTimeout(() => {
                const activeItem = document.querySelector('.playlist-item.active');
                if (activeItem) {
                    activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, 100);
        }

        // ====== Event Listeners ======
        document.getElementById('instructor-search').addEventListener('input', (e) => {
            renderInstructorList(e.target.value);
        });

        document.getElementById('playlist-search').addEventListener('input', (e) => {
            renderPlaylist(e.target.value);
        });

        document.getElementById('mobile-instructor-dropdown').addEventListener('change', (e) => {
            if (e.target.value) {
                selectInstructor(e.target.value);
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

            switch (e.key) {
                case 'n':
                case 'N':
                    // Next video
                    if (state.currentVideoIndex < state.videos.length - 1) {
                        playVideo(state.currentVideoIndex + 1);
                    }
                    break;
                case 'p':
                case 'P':
                    // Previous video
                    if (state.currentVideoIndex > 0) {
                        playVideo(state.currentVideoIndex - 1);
                    }
                    break;
            }
        });

        // ====== Init ======
        initPlayer();
        loadInstructors();
    </script>
</body>
